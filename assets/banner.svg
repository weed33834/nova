<svg width="800" height="200" viewBox="0 0 800 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0f0f23"/>
      <stop offset="100%" stop-color="#1a1a3e"/>
    </linearGradient>
    <linearGradient id="starGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="50%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#ec4899"/>
    </linearGradient>
    <linearGradient id="capGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="800" height="200" rx="12" fill="url(#bg)"/>
  <!-- Logo -->
  <g transform="translate(60, 40)">
    <g filter="url(#glow)">
      <path d="M60 15 L67 55 L105 48 L72 65 L88 100 L60 80 L32 100 L48 65 L15 48 L53 55 Z"
            fill="url(#starGrad)" opacity="0.9"/>
    </g>
    <g transform="translate(60, 65)">
      <path d="M-25,-3 L0,-13 L25,-3 L0,7 Z" fill="url(#capGrad)"/>
      <line x1="20" y1="-3" x2="25" y2="12" stroke="#fbbf24" stroke-width="2" stroke-linecap="round"/>
      <circle cx="25" cy="14" r="3" fill="#fbbf24"/>
    </g>
  </g>
  <!-- Text -->
  <text x="190" y="95" font-family="system-ui, -apple-system, sans-serif" font-size="52" font-weight="700" fill="#f8fafc">Nova</text>
  <text x="190" y="130" font-family="system-ui, -apple-system, sans-serif" font-size="18" fill="#a78bfa" font-weight="500">AI-Powered Interactive Classroom Platform</text>
  <text x="190" y="158" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#64748b">Multi-Agent · Prompt Engineering · Knowledge Graph</text>
  <!-- Sparkles -->
  <circle cx="750" cy="40" r="2" fill="#ec4899" opacity="0.6"/>
  <circle cx="730" cy="70" r="1.5" fill="#a78bfa" opacity="0.5"/>
  <circle cx="760" cy="160" r="2" fill="#6366f1" opacity="0.4"/>
  <circle cx="700" cy="180" r="1.5" fill="#8b5cf6" opacity="0.5"/>
</svg>
