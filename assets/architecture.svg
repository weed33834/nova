<svg width="800" height="420" viewBox="0 0 800 420" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="blue" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#3b82f6"/><stop offset="100%" stop-color="#1d4ed8"/></linearGradient>
    <linearGradient id="purple" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#8b5cf6"/><stop offset="100%" stop-color="#6d28d9"/></linearGradient>
    <linearGradient id="pink" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#ec4899"/><stop offset="100%" stop-color="#be185d"/></linearGradient>
    <linearGradient id="green" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#10b981"/><stop offset="100%" stop-color="#047857"/></linearGradient>
    <linearGradient id="orange" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#f59e0b"/><stop offset="100%" stop-color="#b45309"/></linearGradient>
  </defs>
  <style>
    text { font-family: system-ui, -apple-system, sans-serif; }
  </style>

  <!-- Layer 1: Input -->
  <rect x="30" y="20" width="160" height="50" rx="8" fill="url(#blue)"/>
  <text x="110" y="50" text-anchor="middle" fill="white" font-size="14" font-weight="600">User Input</text>

  <!-- Arrow -->
  <line x1="190" y1="45" x2="240" y2="45" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Layer 2: Prompt Engine -->
  <rect x="240" y="20" width="160" height="50" rx="8" fill="url(#purple)"/>
  <text x="320" y="42" text-anchor="middle" fill="white" font-size="13" font-weight="600">Prompt Engine</text>
  <text x="320" y="58" text-anchor="middle" fill="#e9d5ff" font-size="10">34 templates + snippets</text>

  <!-- Arrow -->
  <line x1="400" y1="45" x2="450" y2="45" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Layer 3: LLM -->
  <rect x="450" y="20" width="160" height="50" rx="8" fill="url(#pink)"/>
  <text x="530" y="42" text-anchor="middle" fill="white" font-size="13" font-weight="600">LLM Provider</text>
  <text x="530" y="58" text-anchor="middle" fill="#fce7f3" font-size="10">20+ providers</text>

  <!-- Arrow -->
  <line x1="610" y1="45" x2="660" y2="45" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Layer 4: Guardrails -->
  <rect x="660" y="20" width="120" height="50" rx="8" fill="url(#orange)"/>
  <text x="720" y="42" text-anchor="middle" fill="white" font-size="13" font-weight="600">Guardrails</text>
  <text x="720" y="58" text-anchor="middle" fill="#fef3c7" font-size="10">PII · Toxic · Hallu</text>

  <!-- Arrow down -->
  <line x1="720" y1="70" x2="720" y2="110" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Layer 5: Multi-Agent -->
  <rect x="450" y="110" width="330" height="80" rx="10" fill="#1e293b" stroke="#475569" stroke-width="1"/>
  <text x="615" y="135" text-anchor="middle" fill="#e2e8f0" font-size="14" font-weight="600">Multi-Agent Classroom</text>
  <rect x="470" y="145" width="90" height="35" rx="6" fill="url(#blue)"/>
  <text x="515" y="167" text-anchor="middle" fill="white" font-size="11">AI Teacher</text>
  <rect x="570" y="145" width="90" height="35" rx="6" fill="url(#green)"/>
  <text x="615" y="167" text-anchor="middle" fill="white" font-size="11">AI Assistant</text>
  <rect x="670" y="145" width="90" height="35" rx="6" fill="url(#purple)"/>
  <text x="715" y="167" text-anchor="middle" fill="white" font-size="11">Class Clown</text>

  <!-- Arrow down from guardrails to classroom -->
  <line x1="615" y1="190" x2="615" y2="225" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Layer 6: Output -->
  <rect x="450" y="225" width="330" height="50" rx="8" fill="url(#green)"/>
  <text x="615" y="255" text-anchor="middle" fill="white" font-size="14" font-weight="600">Interactive Classroom</text>

  <!-- Left side: APIs -->
  <rect x="30" y="110" width="160" height="35" rx="6" fill="#334155"/>
  <text x="110" y="132" text-anchor="middle" fill="#cbd5e1" font-size="12">/api/prompts</text>
  <rect x="30" y="150" width="160" height="35" rx="6" fill="#334155"/>
  <text x="110" y="172" text-anchor="middle" fill="#cbd5e1" font-size="12">/api/skills</text>
  <rect x="30" y="190" width="160" height="35" rx="6" fill="#334155"/>
  <text x="110" y="212" text-anchor="middle" fill="#cbd5e1" font-size="12">/api/generate/*</text>

  <!-- Connect APIs to prompt engine -->
  <line x1="190" y1="127" x2="240" y2="60" stroke="#475569" stroke-width="1.5" stroke-dasharray="4"/>

  <!-- Bottom: Storage -->
  <rect x="200" y="300" width="400" height="50" rx="8" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <text x="400" y="325" text-anchor="middle" fill="#94a3b8" font-size="13">Storage Layer · Zustand Persist · localStorage</text>

  <!-- Arrows to storage -->
  <line x1="400" y1="275" x2="400" y2="300" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="110" y1="225" x2="110" y2="290" stroke="#475569" stroke-width="1" stroke-dasharray="4"/>
  <line x1="110" y1="290" x2="200" y2="310" stroke="#475569" stroke-width="1" stroke-dasharray="4"/>

  <!-- Legend -->
  <text x="30" y="390" fill="#64748b" font-size="11">Architecture: Input → Prompt Engine → LLM → Guardrails → Multi-Agent → Classroom</text>

  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#475569"/>
    </marker>
  </defs>
</svg>
