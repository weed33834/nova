# Local, self-hosted LLM deployment for offline-capable Nova classrooms.
# First run: docker compose -f docker-compose.yml -f docker-compose.ollama.yml up -d --build
# Then:      docker compose -f docker-compose.yml -f docker-compose.ollama.yml run --rm ollama-pull
services:
  nova:
    depends_on:
      ollama:
        condition: service_started
    volumes:
      - ./server-providers.yml:/app/server-providers.yml:ro

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    restart: unless-stopped

  ollama-pull:
    image: ollama/ollama:latest
    depends_on:
      ollama:
        condition: service_started
    environment:
      OLLAMA_HOST: http://ollama:11434
    entrypoint: ["ollama", "pull", "qwen2.5:7b-instruct"]
    profiles: ["setup"]

volumes:
  ollama-data:
