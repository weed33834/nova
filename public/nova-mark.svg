<svg width="100" height="100" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Nova mark: a four-point sparkle (new star) with a curved trajectory trail -->
  <defs>
    <linearGradient id="novaGrad" x1="10" y1="10" x2="90" y2="90" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#F472B6"/>
      <stop offset="1" stop-color="#DB2777"/>
    </linearGradient>
  </defs>
  <!-- Trajectory trail (arc sweeping from upper-right) -->
  <path d="M92 18 Q 108 52, 70 88" stroke="#DB2777" stroke-width="3.5" stroke-linecap="round" opacity="0.35" fill="none"/>
  <!-- Main sparkle: 4-pointed new star -->
  <path d="M50 6 C 53 32, 68 47, 94 50 C 68 53, 53 68, 50 94 C 47 68, 32 53, 6 50 C 32 47, 47 32, 50 6 Z" fill="url(#novaGrad)"/>
  <!-- Inner highlight -->
  <path d="M50 22 C 51 38, 60 47, 78 50 C 60 53, 51 62, 50 78 C 49 62, 40 53, 22 50 C 40 47, 49 38, 50 22 Z" fill="#FFFFFF" opacity="0.18"/>
</svg>
